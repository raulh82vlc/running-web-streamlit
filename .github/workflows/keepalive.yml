name: Streamlit Keep-Alive

on:
  schedule:
    - cron: "0 */10 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "Missing STREAMLIT_APP_URL secret" >&2
            exit 1
          fi

          python - <<'PY'
          import os
          from playwright.sync_api import sync_playwright

          app_url = os.environ["STREAMLIT_APP_URL"].rstrip("/")

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(app_url, wait_until="networkidle", timeout=60000)

              wake_button = page.get_by_role("button", name="Yes, get this app back up!")
              if wake_button.count() > 0:
                  wake_button.click(timeout=10000)
                  page.wait_for_timeout(5000)

              browser.close()
          PY