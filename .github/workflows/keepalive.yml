name: Streamlit Keep-Alive

on:
  schedule:
    - cron: "0 */10 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "Missing STREAMLIT_APP_URL secret" >&2
            exit 1
          fi

          status_code="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --max-time 60 "$STREAMLIT_APP_URL")"

          case "$status_code" in
            2*|3*)
              ;;
            *)
              echo "Unexpected HTTP status from keep-alive ping: $status_code" >&2
              exit 1
              ;;
          esac
